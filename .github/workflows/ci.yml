name: LMS Quality Assurance

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-qa:
    name: Frontend Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install Dependencies
        working-directory: frontend
        run: npm ci
        
      - name: Type Check
        working-directory: frontend
        run: npm run type-check
        
      - name: Lint
        working-directory: frontend
        run: npm run lint
        
      - name: Test
        working-directory: frontend
        run: npm run test
        
      - name: Security Audit
        working-directory: frontend
        run: npm audit --audit-level=high
        
      - name: Build
        working-directory: frontend
        run: npm run build

  backend-qa:
    name: Backend Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Build and Test with Maven
        working-directory: backend
        # We skip dependency-check here to keep the main build fast (under 3-5 mins)
        run: ./mvnw verify -Dspotbugs.skip=false -Ddependency-check.skip=true

  backend-security-scan:
    name: Backend Security Scan (Parallel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Dependency Check Data
        uses: actions/cache@v4
        with:
          path: backend/dependency-check-data
          key: ${{ runner.os }}-dep-check-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-dep-check-

      - name: Run OWASP Dependency Check
        working-directory: backend
        run: ./mvnw dependency-check:check -Ddependency-check.skip=false
